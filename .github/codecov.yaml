# ... previous config options...

comment:
  layout: "header, diff, flags, components"  # show component info in the PR comment

coverage:
  status:
    project:
      default:   # default is the status check's name, not default settings
        target: auto
        threshold: 5
        paths:
        - "packages/*/src/**"
        # advanced settings
        branches:
        - master
        if_ci_failed: error #success, failure, error, ignore
        only_pulls: false

component_management:
  default_rules:  # default rules that will be inherited by all components
    statuses:
    - type: project # in this case every component that doens't have a status defined will have a project type one
      target: auto
      branches:
      - "!master"
  individual_components:
  - component_id: module_laravel_typefinder
    name: Laravel Typefinder
    paths:
    - packages/laravel-typefinder/**
  - component_id: module_vite_plugin_laravel_typefinder
    name: Vite Plugin
    paths:
    - packages/vite-plugin-laravel-typefinder/**