name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  php:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*', '13.*']
        exclude:
          # Laravel 13 requires PHP 8.3+
          - php: '8.2'
            laravel: '13.*'

    name: P${{ matrix.php }} L${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install dependencies
        env:
          LARAVEL_VERSION: ${{ matrix.laravel }}
        run: |
          composer require "laravel/framework:${LARAVEL_VERSION}" "orchestra/testbench:*" --no-update --no-interaction
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit

  pint:
    runs-on: ubuntu-latest
    name: Pint (code style)

    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Install
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Check style
        run: vendor/bin/pint --test

  vite-plugin:
    runs-on: ubuntu-latest
    name: Vite plugin build & lint

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install
        working-directory: packages/vite-plugin-laravel-typefinder
        run: npm install
      - name: Lint
        working-directory: packages/vite-plugin-laravel-typefinder
        run: npm run lint
      - name: Build
        working-directory: packages/vite-plugin-laravel-typefinder
        run: npm run build
