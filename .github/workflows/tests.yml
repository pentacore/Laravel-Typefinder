name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  php:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        laravel: ['11.*', '12.*', '13.*']
        exclude:
        # Laravel 11 requires PHP 8.4-
        - php: '8.5'
          laravel: '11.*'

    name: P${{ matrix.php }} L${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute matrix slug
        env:
          LARAVEL_VERSION: ${{ matrix.laravel }}
        run: echo "LARAVEL_SLUG=${LARAVEL_VERSION%%.*}" >> "$GITHUB_ENV"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install dependencies
        env:
          LARAVEL_VERSION: ${{ matrix.laravel }}
        run: |
          composer require "laravel/framework:${LARAVEL_VERSION}" "orchestra/testbench:*" --no-update --no-interaction
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit --log-junit "phpunit-P${{ matrix.php }}-L${LARAVEL_SLUG}.xml"

      - name: Upload JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-P${{ matrix.php }}-L${{ env.LARAVEL_SLUG }}
          path: phpunit-P${{ matrix.php }}-L${{ env.LARAVEL_SLUG }}.xml
          if-no-files-found: warn

      - name: Upload generated .d.ts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-dts-P${{ matrix.php }}-L${{ env.LARAVEL_SLUG }}
          path: workbench/resources/js/typefinder/**
          if-no-files-found: error

  pint:
    runs-on: ubuntu-latest
    name: Pint (code style)

    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Install
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Check style
        run: vendor/bin/pint --test

  rector:
    runs-on: ubuntu-latest
    name: Rector
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Install
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Check with Rector
        run: vendor/bin/rector process --dry-run

  vite-plugin:
    runs-on: ubuntu-latest
    name: Vite plugin build & lint

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install
        working-directory: packages/vite-plugin-laravel-typefinder
        run: npm install
      - name: Lint
        working-directory: packages/vite-plugin-laravel-typefinder
        run: npm run lint
      - name: Test with coverage
        working-directory: packages/vite-plugin-laravel-typefinder
        run: npx vitest run --coverage
      - name: Build
        working-directory: packages/vite-plugin-laravel-typefinder
        run: npm run build
      - name: Upload vite-plugin dist
        uses: actions/upload-artifact@v4
        with:
          name: vite-plugin-dist
          path: packages/vite-plugin-laravel-typefinder/dist
          if-no-files-found: error
      - name: Upload JS coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: packages/vite-plugin-laravel-typefinder/coverage/lcov.info
          flags: js
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  coverage:
    runs-on: ubuntu-latest
    name: Coverage (PHP 8.5 / Laravel 12)

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: pcov

      - name: Install dependencies
        run: |
          composer require "laravel/framework:12.*" "orchestra/testbench:*" --no-update --no-interaction
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit with coverage
        run: vendor/bin/phpunit --coverage-clover=coverage.xml --log-junit=junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml,junit.xml
          flags: php
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  test-summary:
    needs: [php]
    if: always()
    runs-on: ubuntu-latest
    name: Test summary
    steps:
      - uses: actions/checkout@v4
      - name: Download JUnit artifacts
        uses: actions/download-artifact@v4
        with:
          path: junit
          pattern: phpunit-*
          merge-multiple: true
      - name: Publish summary
        uses: dorny/test-reporter@v1
        with:
          name: PHPUnit
          path: junit/*.xml
          reporter: java-junit
          fail-on-error: false
