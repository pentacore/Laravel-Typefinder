name: Release

on:
  workflow_run:
    workflows: ['Tests']
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run semantic-release in dry-run mode (no publish)'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  actions: read

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install root deps
        run: npm install --no-audit --no-fund

      - name: Download dist from tests run
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: vite-plugin-dist
          path: packages/vite-plugin-laravel-typefinder/dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Fallback build if dist missing
        run: |
          if [ ! -f packages/vite-plugin-laravel-typefinder/dist/index.mjs ]; then
            echo "No dist artifact; building fresh."
            npm run build
          fi

      - name: Download reference .d.ts
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          pattern: generated-dts-P8.5-L13
          path: artifacts/generated-dts
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            npx semantic-release --dry-run
          else
            npx semantic-release
          fi

      - name: Ping Packagist
        if: ${{ !inputs.dry_run }}
        continue-on-error: true
        env:
          PACKAGIST_USER: ${{ secrets.PACKAGIST_USER }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$PACKAGIST_USER" ] || [ -z "$PACKAGIST_TOKEN" ]; then
            echo "Packagist credentials not set; skipping (the GitHub webhook can handle resync)."
            exit 0
          fi
          curl -sf -XPOST -H 'content-type:application/json' \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USER}&apiToken=${PACKAGIST_TOKEN}" \
            -d "{\"repository\":{\"url\":\"https://github.com/${REPO}\"}}" \
            || echo "Packagist ping failed (non-fatal)"
